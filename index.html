<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Ledger</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/ledger-logo.png" alt="The Ledger Logo" class="logo" />
        <div>
          <h1>The Ledger</h1>
          <p>Civil Case Builder</p>
        </div>
      </div>

      <button id="newCaseBtn" class="primary-btn">
        + New Case
      </button>

      <div class="search-box">
        <input id="caseSearch" type="text" placeholder="Search cases..." />
      </div>

      <div class="case-list-wrap">
        <h2>Your Cases</h2>
        <ul id="caseList" class="case-list"></ul>
      </div>
    </aside>

    <!-- MAIN APP -->
    <main class="main">

      <!-- TOP BAR -->
      <header class="topbar">
        <div>
          <p class="eyebrow">Active Civil File</p>
          <h2 id="activeCaseTitle">No Case Selected</h2>
        </div>

        <div class="topbar-actions">
          <button id="deleteCaseBtn" class="danger-btn">Delete Case</button>
        </div>
      </header>

      <!-- CASE DASHBOARD -->
      <section class="dashboard">
        <div class="stat-card">
          <span>Timeline</span>
          <strong id="timelineCount">0</strong>
        </div>

        <div class="stat-card">
          <span>Evidence</span>
          <strong id="evidenceCount">0</strong>
        </div>

        <div class="stat-card">
          <span>Damages</span>
          <strong id="damagesCount">0</strong>
        </div>

        <div class="stat-card">
          <span>Documents</span>
          <strong id="docsCount">0</strong>
        </div>
      </section>

      <!-- TABS -->
      <nav class="tabs">
        <button class="tab active" data-tab="timeline">Timeline</button>
        <button class="tab" data-tab="evidence">Evidence</button>
        <button class="tab" data-tab="damages">Damages</button>
        <button class="tab" data-tab="documents">Documents</button>
        <button class="tab" data-tab="summary">Summary</button>
      </nav>

      <!-- CONTENT AREA -->
      <section class="content">

        <!-- TIMELINE -->
        <div id="timeline" class="tab-panel active">
          <div class="panel-header">
            <h3>Timeline</h3>
            <button class="small-btn" id="addTimelineBtn">+ Add Event</button>
          </div>

          <div class="form-grid">
            <input id="timelineDate" type="date" />
            <input id="timelineTitle" type="text" placeholder="Event title" />
            <textarea id="timelineNotes" placeholder="What happened?"></textarea>
          </div>

          <ul id="timelineList" class="item-list"></ul>
        </div>

        <!-- EVIDENCE -->
        <div id="evidence" class="tab-panel">
          <div class="panel-header">
            <h3>Evidence</h3>
            <button class="small-btn" id="addEvidenceBtn">+ Add Evidence</button>
          </div>

          <div class="form-grid">
            <input id="evidenceTitle" type="text" placeholder="Evidence title" />
            <input id="evidenceType" type="text" placeholder="Type: photo, text, receipt, email..." />
            <textarea id="evidenceNotes" placeholder="Why does this matter?"></textarea>
          </div>

          <ul id="evidenceList" class="item-list"></ul>
        </div>

        <!-- DAMAGES -->
        <div id="damages" class="tab-panel">
          <div class="panel-header">
            <h3>Damages</h3>
            <button class="small-btn" id="addDamageBtn">+ Add Damage</button>
          </div>

          <div class="form-grid">
            <input id="damageTitle" type="text" placeholder="Damage title" />
            <input id="damageAmount" type="number" placeholder="Amount $" />
            <textarea id="damageNotes" placeholder="Details / proof / reason"></textarea>
          </div>

          <ul id="damagesList" class="item-list"></ul>
        </div>

        <!-- DOCUMENTS -->
        <div id="documents" class="tab-panel">
          <div class="panel-header">
            <h3>Documents</h3>
            <button class="small-btn" id="addDocumentBtn">+ Add Document</button>
          </div>

          <div class="form-grid">
            <input id="documentTitle" type="text" placeholder="Document title" />
            <input id="documentCategory" type="text" placeholder="Category: demand, exhibit, letter..." />
            <textarea id="documentNotes" placeholder="Notes / purpose"></textarea>
          </div>

          <ul id="documentsList" class="item-list"></ul>
        </div>

        <!-- SUMMARY -->
        <div id="summary" class="tab-panel">
          <div class="panel-header">
            <h3>Case Summary</h3>
            <button class="small-btn" id="copySummaryBtn">Copy Summary</button>
          </div>

          <textarea id="caseSummary" readonly></textarea>
        </div>

      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
